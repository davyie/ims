# Render Blueprint — deploys backend + frontend as two Web Services.
# The PostgreSQL database is managed separately in the Render dashboard.
#
# BEFORE deploying:
#   1. Push this repo to GitHub/GitLab and connect it in the Render dashboard.
#   2. After the Blueprint is created, set all env vars marked sync:false
#      in the Render dashboard (Environment tab of each service).
#   3. DB vars: use the Internal Host from your Render Postgres dashboard.
#
# KAFKA: Render has no managed Kafka. Create a free broker at https://upstash.com
# then set KAFKA_BOOTSTRAP on ims-backend to your Upstash bootstrap URL.
# Upstash requires SASL/SSL — also set these on ims-backend:
#   SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL
#   SPRING_KAFKA_PROPERTIES_SASL_MECHANISM=SCRAM-SHA-256
#   SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG=org.apache.kafka.common.security.scram.ScramLoginModule required username="..." password="...";

services:
  - type: web
    name: ims-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        sync: false  # Internal hostname from Render Postgres dashboard
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false  # Your Postgres database name
      - key: DB_USERNAME
        sync: false  # Your Postgres username
      - key: DB_PASSWORD
        sync: false  # Your Postgres password
      - key: KAFKA_BOOTSTRAP
        sync: false  # Upstash (or other) Kafka bootstrap URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: OUTBOX_POLL_MS
        value: "500"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your frontend URL, e.g. https://ims-frontend.onrender.com

  - type: web
    name: ims-frontend
    runtime: docker
    dockerContext: frontend/ims-frontend
    dockerfilePath: frontend/ims-frontend/Dockerfile
    plan: free
    envVars:
      - key: API_URL
        sync: false  # Set to your backend URL, e.g. https://ims-backend.onrender.com

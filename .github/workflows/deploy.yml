name: Deploy

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # On workflow_run, only proceed if CI passed
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/ims

            # Pull latest code
            git pull origin main

            # Write .env from secrets
            cat > .env << 'ENVEOF'
            SPRING_PROFILES_ACTIVE=prod

            POSTGRES_DB=imsdb
            POSTGRES_USER=ims
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}

            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=imsdb
            DB_USERNAME=ims
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            KAFKA_BOOTSTRAP=localhost:9092

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_MS=86400000

            APP_IMAGE=ghcr.io/${{ github.repository_owner }}/ims-backend:latest
            FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/ims-frontend:latest
            APP_PORT=8080
            FRONTEND_PORT=80
            API_URL=http://application:8080

            OUTBOX_POLL_MS=500
            LOG_LEVEL=INFO
            ENVEOF

            # Log in to GHCR and pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Bring up the stack
            docker compose up -d --remove-orphans

            # Health check — wait up to 50s for backend
            echo "Waiting for backend health..."
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "Backend is healthy."
                exit 0
              fi
              echo "  attempt $i/10, retrying in 5s..."
              sleep 5
            done
            echo "Backend did not become healthy in time." >&2
            exit 1

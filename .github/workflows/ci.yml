name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend-build:
    name: Backend — build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: imsdb_test
          POSTGRES_USER: ims
          POSTGRES_PASSWORD: ims
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ims -d imsdb_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and verify
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_NAME: imsdb_test
          TEST_DB_USERNAME: ims
          TEST_DB_PASSWORD: ims
        run: mvn -B clean verify --no-transfer-progress

  frontend-build:
    name: Frontend — test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/ims-frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend/ims-frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend/ims-frontend
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI

      - name: Build production
        working-directory: frontend/ims-frontend
        run: npx ng build --configuration production

  docker-build:
    name: Docker — build & push images
    runs-on: ubuntu-latest
    needs: [ backend-build, frontend-build ]
    # Only push images when merging to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ims-backend:latest
            ghcr.io/${{ github.repository_owner }}/ims-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/ims-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ims-frontend:latest
            ghcr.io/${{ github.repository_owner }}/ims-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

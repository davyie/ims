<div class="edit-dialog">
    <form (ngSubmit)="onSubmit()" #editForm="ngForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" [(ngModel)]="formData.item.name" name="name" class="form-control" />
        </div>
        <div class="form-group">
            <label for="price">Price:</label>
            <input type="number" id="price" [(ngModel)]="formData.item.price" name="price" class="form-control" />
        </div>
        <div class="form-group">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity"[(ngModel)]="formData.quantity" name="quantity" class="form-control" />
        </div>
        <button type="submit" class="btn btn-primary">Save</button> 
    </form>
</div>

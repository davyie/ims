<form (ngSubmit)="onSubmit()" #addItemForm="ngForm">
    <label for="dropdown1">Select warehouse:</label>
    <select id="dropdown1" name="dropdown1" *ngFor="let warehouse of warehouses" [(ngModel)]="warehouseId" (ngModelChange)="onSelectionChange()">
        <option [value]="warehouse.id">{{warehouse.id}}</option>
    </select>

    <label for="dropdown2">Select Item:</label>
    <select id="dropdown2" name="dropdown2" [(ngModel)]="selectedItem" (ngModelChange)="onSelectionChange()">
        <option *ngFor="let item of warehouseInventory" [value]="item.item.itemId">{{item.item.name}} | {{item.item.itemId}}</option>
    </select>

    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" [(ngModel)]="quantity" required>
    <button type="submit">Add</button>
</form>

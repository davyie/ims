<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-content>
      <div class="login-header">
        <mat-icon class="brand-icon">inventory</mat-icon>
        <h1 class="brand-title">IMS</h1>
        <p class="brand-subtitle">Inventory Management System</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="admin@ims.com" autocomplete="email">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password"
            [type]="hidePassword() ? 'password' : 'text'"
            autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="login-btn" [disabled]="loading()">
          <mat-spinner *ngIf="loading()" diameter="20" class="spinner"></mat-spinner>
          <span *ngIf="!loading()">Sign In</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

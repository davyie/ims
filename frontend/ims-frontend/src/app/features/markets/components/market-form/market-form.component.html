<div class="market-form">
  <app-page-header [title]="title" [breadcrumbs]="breadcrumbs"></app-page-header>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form-content">
        <div class="field-row">
          <mat-form-field appearance="outline">
            <mat-label>Market Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. Summer Fair 2025">
            <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
            <mat-error *ngIf="form.get('name')?.hasError('minlength')">Min 2 characters</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Location</mat-label>
            <input matInput formControlName="location" placeholder="e.g. City Center">
            <mat-icon matSuffix>location_on</mat-icon>
          </mat-form-field>
        </div>

        <div class="field-row">
          <mat-form-field appearance="outline">
            <mat-label>Market Type</mat-label>
            <mat-select formControlName="marketType">
              <mat-option *ngFor="let t of marketTypes" [value]="t.value">{{ t.label }}</mat-option>
            </mat-select>
            <mat-error>Market type is required</mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-field">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3" placeholder="Optional description"></textarea>
        </mat-form-field>

        <div class="form-actions">
          <button mat-stroked-button type="button" routerLink="/markets">Cancel</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="saving">
            <mat-icon>save</mat-icon>
            {{ saving ? 'Saving...' : (isEdit ? 'Update Market' : 'Create Market') }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>

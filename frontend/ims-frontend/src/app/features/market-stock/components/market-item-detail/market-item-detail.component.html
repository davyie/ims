<div class="market-item-detail" *ngIf="marketStock() as ms">
  <app-page-header title="Market Stock Item" [breadcrumbs]="breadcrumbs"></app-page-header>

  <div class="detail-grid">
    <mat-card class="stock-card">
      <mat-card-header>
        <mat-card-title>Stock</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="stock-metrics">
          <div class="metric accent">
            <span class="metric-value">{{ ms.quantity }}</span>
            <span class="metric-label">Current Stock</span>
            <app-stock-level [stock]="ms.quantity"></app-stock-level>
          </div>
        </div>

        <mat-divider style="margin: 16px 0"></mat-divider>

        <div class="action-btns">
          <button mat-stroked-button color="primary" (click)="showIncrementForm.set(!showIncrementForm())">
            <mat-icon>add</mat-icon> Increment
          </button>
          <button mat-stroked-button color="warn" (click)="showDecrementForm.set(!showDecrementForm())">
            <mat-icon>remove</mat-icon> Decrement
          </button>
        </div>

        <!-- Increment Form -->
        <div *ngIf="showIncrementForm()" class="inline-form">
          <form [formGroup]="incrementForm" (ngSubmit)="applyIncrement()">
            <mat-form-field appearance="outline">
              <mat-label>Quantity</mat-label>
              <input matInput type="number" formControlName="quantity" min="1">
            </mat-form-field>
            <div class="inline-actions">
              <button mat-stroked-button type="button" (click)="showIncrementForm.set(false)">Cancel</button>
              <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Apply</button>
            </div>
          </form>
        </div>

        <!-- Decrement Form -->
        <div *ngIf="showDecrementForm()" class="inline-form">
          <form [formGroup]="decrementForm" (ngSubmit)="applyDecrement()">
            <mat-form-field appearance="outline">
              <mat-label>Quantity</mat-label>
              <input matInput type="number" formControlName="quantity" min="1" [max]="ms.quantity">
            </mat-form-field>
            <div class="inline-actions">
              <button mat-stroked-button type="button" (click)="showDecrementForm.set(false)">Cancel</button>
              <button mat-flat-button color="warn" type="submit" [disabled]="saving()">Apply</button>
            </div>
          </form>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<div *ngIf="!marketStock() && !saving()" class="empty-msg" style="padding: 32px; text-align: center">
  Stock entry not found for this item in this market.
</div>

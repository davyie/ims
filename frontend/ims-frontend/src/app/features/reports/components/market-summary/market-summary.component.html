<div class="market-summary">
  <app-page-header title="Market Session Report" [breadcrumbs]="breadcrumbs">
    <button mat-stroked-button (click)="exportCsv()">
      <mat-icon>download</mat-icon> Export CSV
    </button>
  </app-page-header>

  <mat-card *ngIf="state.loading()">
    <mat-card-content><p>Loading report...</p></mat-card-content>
  </mat-card>

  <mat-card *ngIf="!state.loading()">
    <mat-card-header>
      <mat-card-title>Market Events ({{ state.events().length }})</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p *ngIf="state.events().length === 0" class="empty-msg">No events recorded for this market yet.</p>
      <div class="table-scroll" *ngIf="state.events().length > 0">
        <table mat-table [dataSource]="state.events()" class="full-width">
          <ng-container matColumnDef="occurred">
            <th mat-header-cell *matHeaderCellDef>Date</th>
            <td mat-cell *matCellDef="let e">{{ (e.occurredAt || e.recordedAt) | dateFormat:'absolute' }}</td>
          </ng-container>
          <ng-container matColumnDef="eventType">
            <th mat-header-cell *matHeaderCellDef>Event Type</th>
            <td mat-cell *matCellDef="let e"><span class="type-badge">{{ e.eventType }}</span></td>
          </ng-container>
          <ng-container matColumnDef="service">
            <th mat-header-cell *matHeaderCellDef>Service</th>
            <td mat-cell *matCellDef="let e">{{ e.originService }}</td>
          </ng-container>
          <ng-container matColumnDef="entityId">
            <th mat-header-cell *matHeaderCellDef>Entity ID</th>
            <td mat-cell *matCellDef="let e">
              <span *ngIf="e.entityId" class="id-chip">{{ e.entityId | slice:0:8 }}…</span>
              <span *ngIf="!e.entityId">—</span>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="eventColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: eventColumns"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>

<div class="stock-adjust-panel">
  <div class="panel-header">
    <h2>Adjust Stock</h2>
    <button mat-icon-button (click)="close.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="item-info">
    <span class="item-name">{{ item.name }}</span>
    <span class="item-sku">{{ item.sku }}</span>
  </div>

  <mat-divider></mat-divider>

  <form [formGroup]="form" (ngSubmit)="submit()" class="adjust-form">
    <div class="delta-row">
      <button mat-icon-button type="button" (click)="decrement()" color="warn">
        <mat-icon>remove</mat-icon>
      </button>
      <mat-form-field appearance="outline" class="delta-field">
        <mat-label>Delta</mat-label>
        <input matInput type="number" formControlName="delta">
        <mat-hint>Positive to add stock, negative to remove</mat-hint>
      </mat-form-field>
      <button mat-icon-button type="button" (click)="increment()" color="primary">
        <mat-icon>add</mat-icon>
      </button>
    </div>

    <div class="panel-actions">
      <button mat-stroked-button type="button" (click)="close.emit()">Cancel</button>
      <button mat-flat-button color="primary" type="submit" [disabled]="saving() || form.get('delta')?.value === 0">
        {{ saving() ? 'Saving...' : 'Apply Adjustment' }}
      </button>
    </div>
  </form>
</div>

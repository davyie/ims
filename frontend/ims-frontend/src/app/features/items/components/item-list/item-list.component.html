<div class="item-list">
  <app-page-header title="Items" [breadcrumbs]="[{label:'Items'}]">
    <button mat-stroked-button (click)="exportCsv()">
      <mat-icon>download</mat-icon> Export CSV
    </button>
    <button mat-flat-button color="primary" routerLink="/items/new">
      <mat-icon>add</mat-icon> Add Item
    </button>
  </app-page-header>

  <!-- Filters -->
  <mat-card class="filter-card">
    <mat-card-content>
      <div class="filter-row">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search items</mat-label>
          <input matInput [ngModel]="searchTerm()" (ngModelChange)="onSearch($event)" placeholder="Name, SKU...">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <div class="spacer"></div>
      </div>

      <div class="category-chips">
        <button mat-stroked-button
          [class.active-cat]="selectedCategory() === 'All'"
          (click)="selectCategory('All')">All</button>
        <button *ngFor="let cat of categoryState.categories()"
          mat-stroked-button
          [class.active-cat]="selectedCategory() === cat.name"
          (click)="selectCategory(cat.name)">
          {{ cat.name }}
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <!-- Table -->
  <mat-card>
    <mat-card-content>
      <app-empty-state
        *ngIf="filteredItems().length === 0 && !state.loading()"
        icon="inventory_2"
        title="No items found"
        subtitle="Try adjusting your search or add a new item"
        ctaLabel="Add Item"
        (ctaClick)="router.navigate(['/items/new'])">
      </app-empty-state>

      <div class="table-scroll">
      <table mat-table [dataSource]="pagedItems()" *ngIf="filteredItems().length > 0" class="full-width">
        <ng-container matColumnDef="sku">
          <th mat-header-cell *matHeaderCellDef>SKU</th>
          <td mat-cell *matCellDef="let item">
            <span class="sku-badge">{{ item.sku }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let item">
            <a [routerLink]="['/items', item.itemId]" class="item-link">{{ item.name }}</a>
            <div *ngIf="item.description" class="item-desc">{{ item.description }}</div>
          </td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let item">
            <span class="category-chip">{{ item.category || '—' }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Unit Price</th>
          <td mat-cell *matCellDef="let item">{{ item.unitPrice != null ? (item.unitPrice | number:'1.2-2') : '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let item">
            <button mat-icon-button [routerLink]="['/items', item.itemId]" matTooltip="View">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button [routerLink]="['/items', item.itemId, 'edit']" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteItem(item, $event)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="item-row"></tr>
      </table>
      </div>

      <mat-paginator
        *ngIf="filteredItems().length > 0"
        [length]="filteredItems().length"
        [pageSize]="pageSize()"
        [pageIndex]="pageIndex()"
        [pageSizeOptions]="[5, 10, 25, 50]"
        (page)="onPage($event)">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>

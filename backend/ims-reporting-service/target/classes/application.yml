spring:
  application:
    name: ims-reporting-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://ims:ims@localhost:27017/ims_reporting?authSource=admin}
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: ims-reporting-service
      auto-offset-reset: earliest

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

ims:
  jwt-secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars}
  logging:
    operation-enabled: true
    exception-enabled: true

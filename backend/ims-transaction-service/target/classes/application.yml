spring:
  application:
    name: ims-transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ims_transaction}
    username: ${DB_USER:ims}
    password: ${DB_PASS:ims}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: ims-transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

server:
  port: 8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

ims:
  jwt-secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars}
  logging:
    operation-enabled: true
    exception-enabled: true

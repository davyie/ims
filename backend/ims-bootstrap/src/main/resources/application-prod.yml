spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:imsdb}?sslmode=require

  flyway:
    clean-disabled: true

  kafka:
    admin:
      fail-fast: false

springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    com.ims: INFO

ims:
  outbox:
    poll-ms: ${OUTBOX_POLL_MS:5000}

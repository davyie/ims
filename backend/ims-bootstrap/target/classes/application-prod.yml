spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

  flyway:
    clean-disabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP}

logging:
  level:
    root: WARN
    com.ims: INFO

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

ims:
  outbox:
    poll-ms: ${OUTBOX_POLL_MS:500}

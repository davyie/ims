spring:
  application:
    name: ims-user-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ims_user}
    username: ${DB_USER:ims}
    password: ${DB_PASS:ims}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

ims:
  user:
    jwt-secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars}
    jwt-expiry-minutes: ${JWT_EXPIRY_MINUTES:60}
    password-min-length: 12
    kafka-topic-events: ims.user.events
  logging:
    operation-enabled: true
    exception-enabled: true

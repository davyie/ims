spring:
  application:
    name: ims-scheduling-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ims_scheduling}
    username: ${DB_USER:ims}
    password: ${DB_PASS:ims}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: ims-scheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.class: org.quartz.impl.jdbcjobstore.JobStoreTX
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: false
      org.quartz.threadPool.threadCount: 5
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

ims:
  jwt-secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars}
  logging:
    operation-enabled: true
    exception-enabled: true
